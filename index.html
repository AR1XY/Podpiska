<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VPN Subscriptions Hub | Белые списки и серверы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1c 0%, #0f172a 100%);
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
            transition: background 0.3s ease;
        }
        body.light {
            background: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%);
        }
        body.light .subscription-card,
        body.light .stat-card,
        body.light .footer,
        body.light .search-box,
        body.light .btn-action {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-color: rgba(0, 0, 0, 0.1);
            color: #1e293b;
        }
        body.light .sub-name { color: #0f172a; }
        body.light .category-title { color: #0f172a; border-bottom-color: #3b82f6; }
        body.light .header h1 {
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a5b4fc, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .subhead { color: #94a3b8; font-size: 0.9rem; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            margin: 1.5rem 0;
        }
        .search-box {
            flex: 2;
            min-width: 200px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
        }
        .search-box::placeholder { color: #64748b; }
        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e2e8f0;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-action:hover { background: #3b82f6; border-color: #3b82f6; }
        body.light .btn-action { background: rgba(0, 0, 0, 0.05); color: #1e293b; }
        body.light .btn-action:hover { background: #3b82f6; color: white; }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
        }
        .stats {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-card span { font-weight: 700; color: #60a5fa; }
        .category { margin-bottom: 2rem; }
        .category-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #3b82f6;
            display: inline-block;
            color: #f1f5f9;
        }
        .subscription-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .subscription-card:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(59, 130, 246, 0.4);
        }
        .sub-info { flex: 2; min-width: 180px; }
        .sub-name { font-weight: 600; color: #e2e8f0; font-size: 1rem; word-break: break-word; }
        .sub-type { font-size: 0.7rem; color: #60a5fa; margin-top: 0.2rem; }
        .checkbox-select { width: 20px; height: 20px; cursor: pointer; accent-color: #3b82f6; }
        .btn-copy {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-copy:hover { background: #3b82f6; border-color: #3b82f6; color: white; }
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            font-size: 0.7rem;
            color: #475569;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .subscription-card { flex-direction: column; align-items: flex-start; }
            .btn-copy, .checkbox-select { width: 100%; text-align: center; }
            .controls { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🍄 VPN Subscriptions Hub</h1>
        <div class="subhead">Различные VPN-серверы и белые списки (WL)</div>
        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск по названию...">
            <button class="btn-action" id="exportBtn">📋 Копировать выбранные</button>
            <button class="btn-action" id="selectAllBtn">✅ Выбрать всё</button>
            <button class="btn-action" id="clearAllBtn">❌ Снять всё</button>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
        <div class="stats" id="stats"></div>
    </div>
    <div id="subscriptions-container"></div>
    <div class="footer">
        ✅ Отметьте нужные подписки → нажмите «Копировать выбранные» → вставьте в Happ, Clash, Sing-box.<br>
        WL = White List (белые списки).
    </div>
</div>

<script src="subscriptions.js"></script>
<script>
    let selectedUrls = new Set();
    let currentFilter = "";
    let allSubscriptions = [];

    // Загрузка подписок из внешнего файла
    async function loadSubscriptions() {
        try {
            const response = await fetch('subscriptions.js');
            const text = await response.text();
            const match = text.match(/const allSubscriptions = (\[[\s\S]*?\]);/);
            if (match) {
                allSubscriptions = eval(match[1]);
                render();
            } else {
                console.error('Не удалось распарсить subscriptions.js');
                document.getElementById('subscriptions-container').innerHTML = '<div style="color:red; text-align:center;">Ошибка загрузки подписок. Проверьте файл subscriptions.js</div>';
            }
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            document.getElementById('subscriptions-container').innerHTML = '<div style="color:red; text-align:center;">Файл subscriptions.js не найден. Положите его в ту же папку.</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function escapeAttr(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }

    async function copyToClipboard(text, button) {
        try {
            await navigator.clipboard.writeText(text);
            const original = button.textContent;
            button.textContent = '✅ Скопировано!';
            setTimeout(() => button.textContent = original, 2000);
        } catch {
            alert('Не удалось скопировать. Скопируйте вручную:\n' + text);
        }
    }

    // КОПИРОВАНИЕ ВСЕХ ВЫБРАННЫХ ССЫЛОК В БУФЕР
    async function copySelectedToClipboard() {
        if (selectedUrls.size === 0) {
            alert("❌ Не выбрано ни одной подписки.");
            return;
        }
        
        const content = Array.from(selectedUrls).join('\n');
        
        try {
            await navigator.clipboard.writeText(content);
            const exportBtn = document.getElementById('exportBtn');
            const originalText = exportBtn.textContent;
            exportBtn.textContent = '✅ Скопировано!';
            setTimeout(() => {
                exportBtn.textContent = originalText;
            }, 2000);
        } catch (err) {
            // fallback для старых браузеров
            const textarea = document.createElement('textarea');
            textarea.value = content;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            alert(`📋 Скопировано ${selectedUrls.size} ссылок в буфер обмена`);
        }
    }

    function render() {
        if (!allSubscriptions.length) return;
        
        const mainSubs = allSubscriptions.filter(s => s.type === "main" && s.name.toLowerCase().includes(currentFilter));
        const wlSubs = allSubscriptions.filter(s => s.type === "wl" && s.name.toLowerCase().includes(currentFilter));
        
        const container = document.getElementById('subscriptions-container');
        container.innerHTML = renderCategory('🟢 Основные подписки (VPN серверы)', mainSubs, false) +
                             renderCategory('⚪ White List (Белые списки / WL)', wlSubs, true);

        document.getElementById('stats').innerHTML = `
            <div class="stat-card">📦 Всего: <span>${allSubscriptions.length}</span></div>
            <div class="stat-card">🟢 Основных: <span>${allSubscriptions.filter(s => s.type === "main").length}</span></div>
            <div class="stat-card">⚪ WhiteList: <span>${allSubscriptions.filter(s => s.type === "wl").length}</span></div>
            <div class="stat-card">🔍 Найдено: <span>${mainSubs.length + wlSubs.length}</span></div>
            <div class="stat-card">✅ Выбрано: <span>${selectedUrls.size}</span></div>
        `;

        document.querySelectorAll('.btn-copy').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const url = btn.getAttribute('data-url');
                copyToClipboard(url, btn);
            });
        });
        
        document.querySelectorAll('.checkbox-select').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const url = cb.getAttribute('data-url');
                if (cb.checked) selectedUrls.add(url);
                else selectedUrls.delete(url);
                render();
            });
        });
    }

    function renderCategory(title, subsArray, isWL) {
        if (subsArray.length === 0) return `<div class="category"><div class="category-title">${title}</div><div style="color:#64748b; padding:1rem;">Нет подписок</div></div>`;
        return `
            <div class="category">
                <div class="category-title">${title} <span style="font-size:0.8rem;">(${subsArray.length})</span></div>
                ${subsArray.map(sub => `
                    <div class="subscription-card">
                        <input type="checkbox" class="checkbox-select" data-url="${escapeAttr(sub.url)}" ${selectedUrls.has(sub.url) ? 'checked' : ''}>
                        <div class="sub-info">
                            <div class="sub-name">${escapeHtml(sub.name)}</div>
                            <div class="sub-type">${isWL ? '⚪ White List' : '🟢 VPN серверы'}</div>
                        </div>
                        <button class="btn-copy" data-url="${escapeAttr(sub.url)}">📋 Копировать</button>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function selectAllVisible() {
        const visibleSubs = allSubscriptions.filter(s => s.name.toLowerCase().includes(currentFilter));
        visibleSubs.forEach(s => selectedUrls.add(s.url));
        render();
    }
    
    function clearAll() { 
        selectedUrls.clear(); 
        render(); 
    }
    
    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            document.body.classList.add('light');
            document.getElementById('themeToggle').textContent = '☀️';
        } else {
            document.body.classList.remove('light');
            document.getElementById('themeToggle').textContent = '🌙';
        }
    }
    
    function toggleTheme() {
        if (document.body.classList.contains('light')) {
            document.body.classList.remove('light');
            localStorage.setItem('theme', 'dark');
            document.getElementById('themeToggle').textContent = '🌙';
        } else {
            document.body.classList.add('light');
            localStorage.setItem('theme', 'light');
            document.getElementById('themeToggle').textContent = '☀️';
        }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentFilter = e.target.value.toLowerCase();
        render();
    });
    document.getElementById('exportBtn').addEventListener('click', copySelectedToClipboard);
    document.getElementById('selectAllBtn').addEventListener('click', selectAllVisible);
    document.getElementById('clearAllBtn').addEventListener('click', clearAll);
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    initTheme();
    loadSubscriptions();
</script>
</body>
</html>
